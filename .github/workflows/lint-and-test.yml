name: Lint and Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install helm-docs
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          HELM_DOCS_VERSION=1.14.2

          curl -sSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            -o helm-docs.tar.gz

          tar -xzf helm-docs.tar.gz          
          sudo mv helm-docs /usr/local/bin/

      - name: Generate helm-docs
        if: steps.list-changed.outputs.changed == 'true'
        run: helm-docs

      - name: Check for helm-docs changes
        id: docs
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          git add charts/**/*.md

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push helm-docs changes
        if: steps.docs.outputs.changed == 'true' && github.actor == 'tourbillon-renovate[bot]'
        run: |
          git config user.name "tourbillon-renovate[bot]"
          git config user.email "266256271+tourbillon-renovate[bot]@users.noreply.github.com"

          git commit -m "docs: update helm-docs"
          git push origin HEAD:${{ github.head_ref }}

      - name: Fail if helm-docs changes are needed
        if: steps.docs.outputs.changed == 'true' && github.actor != 'tourbillon-renovate[bot]'
        run: |
          echo "::error::Helm documentation needs to be updated. Please run 'helm-docs' locally and commit the changes."
          exit 1

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config ct.yaml --target-branch ${{ github.event.repository.default_branch }}

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.12.0

      - name: Prepare kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          
          helm install cnpg cnpg/cloudnative-pg \
            --namespace cnpg-system \
            --create-namespace \
            --timeout 5m \
            --wait 

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --target-branch ${{ github.event.repository.default_branch }}
